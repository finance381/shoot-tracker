name: Bump SW Version
on:
  push:
    branches: [main]

jobs:
  bump:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Update SW version
        run: |
          TIMESTAMP=$(date +%s)
          sed -i "s/const APP_VERSION = .*/const APP_VERSION = 'v-${TIMESTAMP}';/" service-worker.js

      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add service-worker.js
          git diff --cached --quiet || git commit -m "auto-bump SW v-${TIMESTAMP}"
          git push
