<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#C17837">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>Shoot Tracker</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icons/pwa-192.png">
  <link rel="apple-touch-icon" href="icons/pwa-192.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <!-- ===== AUTH SCREEN ===== -->
  <div id="auth-screen" class="hidden">
    <div class="auth-card">
      <div class="auth-logo">📸</div>
      <h1 class="auth-title">Shoot Tracker</h1>
      <p class="auth-sub">Organise your team's shoots</p>

      <div id="auth-error" class="auth-error hidden"></div>

      <div class="form-group">
        <label>Phone number</label>
        <input type="tel" id="auth-phone" placeholder="e.g. 9876543210" autocomplete="tel">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="auth-pass" placeholder="••••••••" autocomplete="current-password">
      </div>

      <button id="auth-submit" class="btn-primary btn-full">Log in</button>
      <p id="auth-setup-link" class="auth-toggle" style="color:var(--stone);font-size:13px;cursor:pointer;">
        First time? <span style="color:var(--terracotta);font-weight:700;">Set up your password</span>
      </p>

    </div>
  </div>

  <!-- ===== MAIN APP ===== -->
  <div id="app" class="hidden">

    <!-- Top bar -->
    <header id="top-bar">
      <div>
        <h1 class="top-title">Shoot Tracker</h1>
        <p class="top-sub" id="user-greeting"></p>
      </div>
      <div class="top-actions">
        <button id="btn-change-pw" class="btn-icon" title="Change password">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        </button>
        <button id="btn-logout" class="btn-icon" title="Log out">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        </button>
      </div>
    </header>

    <!-- Page container -->
    <div id="pull-refresh" class="pull-refresh"><span>↻ Release to refresh</span></div>
    <main id="main-content">
      <section id="page-dashboard" class="page active"></section>
      <section id="page-calendar" class="page"></section>
      <section id="page-shoots" class="page"></section>
      <section id="page-team" class="page"></section>
      <section id="page-reports" class="page"></section>
      <section id="page-requests" class="page"></section>
    </main>

    <!-- FAB -->
    <button id="fab" class="fab" title="New shoot">+</button>

    <!-- Bottom nav -->
    <nav id="bottom-nav">
      <button class="nav-tab active" data-page="dashboard">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
        <span>Home</span>
      </button>
      <button class="nav-tab" data-page="calendar">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        <span>Calendar</span>
      </button>
      <button class="nav-tab" data-page="shoots">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="4"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/></svg>
        <span>Shoots</span>
      </button>
      <button class="nav-tab" data-page="team">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        <span>Team</span>
      </button>
      <button class="nav-tab" data-page="requests">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
        <span>Requests</span>
      </button>
      <button class="nav-tab" data-page="reports" style="display:none">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M18 20V10"/><path d="M12 20V4"/><path d="M6 20v-6"/></svg>
        <span>Reports</span>
      </button>
    </nav>
  </div>

  <!-- ===== SHOOT MODAL ===== -->
  <div id="shoot-modal" class="modal-overlay hidden">
    <div class="modal">
      <div class="modal-header">
        <h2 id="modal-title">New Shoot</h2>
        <button id="modal-close" class="btn-icon">✕</button>
      </div>
      <div class="modal-body">
        <div class="form-row-2">
          <div class="form-group">
            <label>Date *</label>
            <input type="date" id="s-date">
          </div>
          <div class="form-group">
            <label>Time</label>
            <input type="time" id="s-time">
          </div>
        </div>
        <div class="form-group">
          <label>Planned or Impromptu</label>
          <div class="toggle-row">
            <button type="button" id="s-planned" class="toggle-btn active">📋 Planned</button>
            <button type="button" id="s-impromptu" class="toggle-btn">⚡ Impromptu</button>
          </div>
        </div>
        <div class="form-group">
          <label>Type *</label>
          <div id="s-type-checks" class="checkbox-group"></div>
        </div>
        <div class="form-group">
          <label>Assignee</label>
          <select id="s-assignee"></select>
        </div>
        <div class="form-group hidden" id="s-external-group">
          <label>External Person Name</label>
          <input type="text" id="s-external" placeholder="e.g. Rahul (freelancer)">
        </div>
        <div class="form-group">
          <label>Function</label>
          <input type="text" id="s-client" placeholder="e.g. Product launch, Wedding">
        </div>
        <div class="form-group">
          <label>Requested By (Sales Person)</label>
          <input type="text" id="s-requested-by" placeholder="e.g. Sahaj, Krati">
        </div>
        <div class="form-group">
          <label>For Department</label>
          <div id="s-dept-checks" class="checkbox-group"></div>
        </div>
        <div class="form-group">
          <label>Location</label>
          <select id="s-location"></select>
        </div>
        <div class="form-group hidden" id="s-outdoor-group">
          <label>Outdoor Venue</label>
          <input type="text" id="s-outdoor" placeholder="e.g. Central Park, Mall Road">
        </div>
        <div class="form-group" id="status-group" style="display:none">
          <label>Status</label>
          <div id="s-status-bar" class="status-bar"></div>
        </div>
        <div class="form-group">
          <label>Notes</label>
          <textarea id="s-notes" rows="3" placeholder="Shot list, props, wardrobe…"></textarea>
        </div>
        <div id="s-audit-log" class="form-group"></div>
      </div>
      <div class="modal-footer">
        <button id="modal-delete" class="btn-danger hidden">Delete</button>
        <span class="spacer"></span>
        <button id="modal-cancel" class="btn-secondary">Cancel</button>
        <button id="modal-save" class="btn-primary">Save</button>
      </div>
    </div>
  </div>

  <!-- ===== TOAST ===== -->
  <div id="toast" class="toast hidden"></div>

  <!-- ===== SCRIPTS ===== -->
  <script type="module" src="js/app.js"></script>
</body>
</html>
